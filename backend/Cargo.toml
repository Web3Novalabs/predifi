[package]
name = "predifi-backend"
version = "0.1.0"
edition = "2021"
description = "Axum HTTP backend for the PrediFi platform"
readme = "README.md"

[[bin]]
name = "predifi-backend"
path = "src/main.rs"

[dependencies]
axum       = "0.7"
tokio      = { version = "1", features = ["full"] }
tower      = "0.4"
http       = "1"
serde_json = "1"
tower-http = { version = "0.6.8", features = ["cors"] }

[dev-dependencies]
http-body-util = "0.1"
tower          = { version = "0.4", features = ["util"] }
