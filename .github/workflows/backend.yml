name: Backend CI

on:
  push:
    branches:
      - main
      - contract
    paths:
      - "contract/**"
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches:
      - main
      - contract
    paths:
      - "contract/**"
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  WASM_SIZE_THRESHOLD_KB: 200

jobs:
  contract-checks:
    name: Contract Checks (WASM)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ./contract

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --target wasm32-unknown-unknown -- -D warnings

      - name: Build contract
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Run unit tests
        run: cargo test --workspace

      - name: Check WASM size
        run: bash scripts/wasm_size_check.sh

      - name: Print WASM size summary
        if: always()
        run: |
          WASM="target/wasm32-unknown-unknown/release/predifi_contract.wasm"
          if [[ -f "$WASM" ]]; then
            BYTES=$(wc -c < "$WASM")
            KB=$(( BYTES / 1024 ))
            echo "### WASM Size: ${KB} KB (${BYTES} bytes)" >> "$GITHUB_STEP_SUMMARY"
            echo "Threshold: ${WASM_SIZE_THRESHOLD_KB} KB" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload WASM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predifi-contract-wasm-${{ github.sha }}
          path: contract/target/wasm32-unknown-unknown/release/predifi_contract.wasm
          if-no-files-found: ignore
          retention-days: 90

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build backend
        run: cargo build --release

      - name: Run unit tests
        run: cargo test
